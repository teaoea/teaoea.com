<mat-form-field appearance="legacy">
  <mat-label>Status</mat-label>
  <select required matNativeControl [(ngModel)]="value"
          (keyup)="newShow(value)" (mouseenter)="newShow(value)">
    <option *ngFor="let s of s" [value]="s.value">{{s.key}}</option>
  </select>
  <mat-error *ngIf="formControl.invalid">{{errorMessage()}}</mat-error>
</mat-form-field>
