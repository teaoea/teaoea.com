<mat-form-field appearance="legacy">
  <mat-label>Category</mat-label>
  <select required matNativeControl [(ngModel)]="value"
          (keyup)="newCategory(value)" (mouseenter)="newCategory(value)">
    <option *ngFor="let c of categories" [value]="c.value">{{c.key}}</option>
  </select>
  <mat-error *ngIf="formControl.invalid">{{errorMessage()}}</mat-error>
</mat-form-field>
