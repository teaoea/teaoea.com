<p>
  <mat-form-field appearance="outline">
    <mat-label i18n="@@7830384099672144615">Email address</mat-label>
    <input matInput required type="email" class="input"
           (keyup)="newEmail(value)" [(ngModel)]="value" [formControl]="formControl">
    <button mat-icon-button matSuffix disabled>
      <mat-icon matSuffix>email</mat-icon>
    </button>
    <mat-error *ngIf="formControl.invalid">{{errorMessage()}}</mat-error>
  </mat-form-field>
</p>
