<app-header></app-header>
<form>
  <username (username)="username($event)"></username>
  <confirm-password (password)="password($event)" (password2)="password2($event)"></confirm-password>
  <email (email)="email($event)"></email>
  <phone (country)="country($event)" (number)="number($event)"></phone>
  <p class="button signup">
    <button mat-raised-button color="primary" type="button"
            (click)="onSubmit()" (keyup.enter)="onSubmit()"
            i18n="@@1571753007969378385">Sign up
    </button>
  </p>
</form>
<app-footer></app-footer>
